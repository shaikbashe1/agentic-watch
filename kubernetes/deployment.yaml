apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentwatch-backend
  namespace: agentwatch
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agentwatch-backend
  template:
    metadata:
      labels:
        app: agentwatch-backend
    spec:
      containers:
        - name: backend
          image: agentwatch/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: CLICKHOUSE_URL
              value: "clickhouse://clickhouse.agentwatch.svc.cluster.local:9000"
            - name: DATABASE_URL
              value: "postgresql://postgres.agentwatch.svc.cluster.local:5432"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: agentwatch-backend
  namespace: agentwatch
spec:
  selector:
    app: agentwatch-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
