version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: agentwatch_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agentwatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: agentwatch_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: agentwatch_celery
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:password@db/agentwatch
    depends_on:
      - redis
      - db
    restart: unless-stopped

volumes:
  postgres_data:
