name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_CONTAINER_REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
  RESOURCE_GROUP: agentic-watch-rg
  ENVIRONMENT_NAME: agenticwatch
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/agentic-watch-frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/agentic-watch-backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }},${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }},${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: az group create --name ${{ env.RESOURCE_GROUP }} --location eastus

      - name: Deploy Azure Infrastructure (Bicep)
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: environmentName=${{ env.ENVIRONMENT_NAME }} pgAdminPassword="${{ secrets.PG_ADMIN_PASSWORD }}" acrServer=ghcr.io acrUsername="${{ github.actor }}" acrPassword="${{ secrets.GITHUB_TOKEN }}" frontendImage=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} backendImage=${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Apply Database Migrations
        run: |
          echo "Triggering database schema initializations via App Service/Container App CLI..."
          # Since it's serverless and public, we could use az containerapp exec if needed.
          # For a real pipeline, we might inject a migration job or rely on backend startup scripts.
