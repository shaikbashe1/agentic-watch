receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  
  # Adds resource attributes based on standard OpenTelemetry semantic conventions
  resourcedetection:
    detectors: [env, system]
    timeout: 2s

exporters:
  clickhouse:
    endpoint: tcp://clickhouse:9000?database=agentwatch
    ttl: 72h
    create_schema: true
    logs_table_name: otel_logs
    traces_table_name: otel_traces
    metrics_table_name: otel_metrics
    timeout: 5s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  logging:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [clickhouse, logging]
    metrics:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [clickhouse, logging]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [clickhouse, logging]
